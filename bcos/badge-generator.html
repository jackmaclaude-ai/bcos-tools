<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCOS v2 — Badge Generator | RustChain</title>
<link rel="icon" href="/rustchain-favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --green: #33ff33;
  --green-dim: #1a8c1a;
  --amber: #ffb000;
  --red: #ff4444;
  --cyan: #00ffff;
  --purple: #bb66ff;
  --bg-dark: #0a0a0a;
  --bg-card: #0d1117;
  --border: #1a331a;
  --text-dim: #668866;
  --text-body: #a0c8a0;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-display: 'VT323', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-mono);
  background: var(--bg-dark);
  color: var(--green);
  min-height: 100vh;
  line-height: 1.6;
  font-size: 15px;
}
.container { max-width: 860px; margin: 0 auto; padding: 40px 20px; }

/* Header */
h1 {
  font-family: var(--font-display);
  font-size: 52px;
  text-align: center;
  margin-bottom: 6px;
  text-shadow: 0 0 20px var(--green);
  letter-spacing: 2px;
}
.subtitle {
  text-align: center;
  color: var(--text-dim);
  margin-bottom: 40px;
  font-size: 13px;
}
.subtitle a { color: var(--cyan); text-decoration: none; }
.subtitle a:hover { text-decoration: underline; }

/* Input section */
.input-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 28px;
  margin-bottom: 28px;
}
.input-section label {
  display: block;
  color: var(--text-dim);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.input-row input {
  flex: 1;
  padding: 12px 16px;
  background: #111;
  border: 1px solid var(--green-dim);
  border-radius: 4px;
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.input-row input:focus { border-color: var(--green); box-shadow: 0 0 8px rgba(51,255,51,0.2); }
.input-row input::placeholder { color: var(--text-dim); }
.btn-primary {
  padding: 12px 24px;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}
.btn-primary:hover { background: #55ff55; box-shadow: 0 0 12px rgba(51,255,51,0.4); }

/* Style selector */
.style-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.style-btn {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--green-dim);
  border-radius: 4px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.style-btn:hover { border-color: var(--green); color: var(--green); }
.style-btn.active {
  border-color: var(--green);
  color: var(--green);
  background: rgba(51,255,51,0.08);
}
.style-label {
  color: var(--text-dim);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  display: block;
}

/* Preview section */
.preview-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 28px;
  margin-bottom: 24px;
  display: none;
}
.preview-section.visible { display: block; }
.section-title {
  color: var(--text-dim);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}
.badge-preview-area {
  background: #111;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
  text-align: center;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  position: relative;
}
.badge-preview-area img { display: inline-block; }
.badge-preview-area.loading::after {
  content: 'LOADING...';
  color: var(--text-dim);
  font-size: 12px;
  animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Cert info */
.cert-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.cert-field {
  background: #111;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
}
.cert-field .field-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.cert-field .field-value { color: var(--green); font-size: 13px; margin-top: 2px; }
.cert-field .field-value.score { color: var(--amber); font-weight: 600; font-size: 16px; }
.cert-field .field-value.pass { color: #33ff33; }
.cert-field .field-value.fail { color: var(--red); }

/* Embed code section */
.embed-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 28px;
  display: none;
}
.embed-section.visible { display: block; }
.tab-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  gap: 0;
}
.tab-btn {
  padding: 10px 20px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: -1px;
}
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.tab-btn:hover { color: var(--text-body); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.code-block {
  background: #070d07;
  border: 1px solid var(--green-dim);
  border-radius: 4px;
  padding: 16px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-body);
  word-break: break-all;
  line-height: 1.7;
  margin-bottom: 12px;
  position: relative;
}
.copy-btn {
  display: block;
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--green-dim);
  border-radius: 4px;
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.copy-btn:hover { background: rgba(51,255,51,0.08); border-color: var(--green); }
.copy-btn.copied { color: var(--amber); border-color: var(--amber); }

/* Size presets for iframe */
.size-presets { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.size-preset-btn {
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--green-dim);
  border-radius: 3px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}
.size-preset-btn:hover, .size-preset-btn.active { border-color: var(--green); color: var(--green); background: rgba(51,255,51,0.05); }

/* Error */
.error-msg {
  background: rgba(255,68,68,0.1);
  border: 1px solid var(--red);
  border-radius: 4px;
  padding: 12px 16px;
  color: var(--red);
  font-size: 13px;
  display: none;
  margin-top: 12px;
}
.error-msg.visible { display: block; }

/* Footer */
.footer {
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.footer a { color: var(--cyan); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Prompt scanline effect */
.scanline {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="container">

  <h1>⬡ BCOS BADGE GEN</h1>
  <p class="subtitle">
    Generate embed badges for your
    <a href="https://rustchain.org/bcos/" target="_blank">BCOS v2 certified</a>
    repository &nbsp;·&nbsp;
    <a href="https://rustchain.org/bcos/" target="_blank">Verify a cert →</a>
  </p>

  <!-- Input Section -->
  <div class="input-section">
    <label>Enter Certificate ID or Repo URL</label>
    <div class="input-row">
      <input type="text" id="certInput" placeholder="BCOS-abc123  or  https://github.com/owner/repo" autocomplete="off" spellcheck="false">
      <button class="btn-primary" onclick="generateBadge()">GENERATE</button>
    </div>

    <span class="style-label">Badge Style</span>
    <div class="style-row">
      <button class="style-btn active" data-style="flat" onclick="selectStyle(this)">flat</button>
      <button class="style-btn" data-style="flat-square" onclick="selectStyle(this)">flat-square</button>
      <button class="style-btn" data-style="for-the-badge" onclick="selectStyle(this)">for-the-badge</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Preview Section -->
  <div class="preview-section" id="previewSection">
    <div class="section-title">▶ Badge Preview</div>
    <div class="badge-preview-area" id="badgePreviewArea">
      <img id="badgeImg" src="" alt="BCOS Badge">
    </div>

    <div class="cert-info" id="certInfo" style="display:none">
      <div class="cert-field">
        <div class="field-label">Certificate ID</div>
        <div class="field-value" id="infoCertId">—</div>
      </div>
      <div class="cert-field">
        <div class="field-label">Trust Score</div>
        <div class="field-value score" id="infoScore">—</div>
      </div>
      <div class="cert-field">
        <div class="field-label">Tier</div>
        <div class="field-value" id="infoTier">—</div>
      </div>
      <div class="cert-field">
        <div class="field-label">Status</div>
        <div class="field-value" id="infoStatus">—</div>
      </div>
    </div>
  </div>

  <!-- Embed Code Section -->
  <div class="embed-section" id="embedSection">
    <div class="section-title">▶ Embed Code</div>

    <div class="tab-row">
      <button class="tab-btn active" data-tab="markdown" onclick="switchTab(this)">Markdown</button>
      <button class="tab-btn" data-tab="html" onclick="switchTab(this)">HTML</button>
      <button class="tab-btn" data-tab="iframe" onclick="switchTab(this)">iFrame</button>
      <button class="tab-btn" data-tab="rst" onclick="switchTab(this)">reStructuredText</button>
    </div>

    <!-- Markdown -->
    <div class="tab-content active" id="tab-markdown">
      <div class="code-block" id="code-markdown"></div>
      <button class="copy-btn" onclick="copyCode('code-markdown', this)">⎘ COPY MARKDOWN</button>
    </div>

    <!-- HTML -->
    <div class="tab-content" id="tab-html">
      <div class="code-block" id="code-html"></div>
      <button class="copy-btn" onclick="copyCode('code-html', this)">⎘ COPY HTML</button>
    </div>

    <!-- iFrame -->
    <div class="tab-content" id="tab-iframe">
      <span class="style-label" style="margin-bottom:8px">Size Preset</span>
      <div class="size-presets">
        <button class="size-preset-btn active" data-w="560" data-h="315" onclick="selectSize(this)">560×315</button>
        <button class="size-preset-btn" data-w="640" data-h="360" onclick="selectSize(this)">640×360</button>
        <button class="size-preset-btn" data-w="854" data-h="480" onclick="selectSize(this)">854×480</button>
      </div>
      <div class="code-block" id="code-iframe"></div>
      <button class="copy-btn" onclick="copyCode('code-iframe', this)">⎘ COPY IFRAME</button>
    </div>

    <!-- reStructuredText -->
    <div class="tab-content" id="tab-rst">
      <div class="code-block" id="code-rst"></div>
      <button class="copy-btn" onclick="copyCode('code-rst', this)">⎘ COPY RST</button>
    </div>
  </div>

  <div class="footer">
    <a href="https://rustchain.org/bcos/" target="_blank">BCOS v2 Verify</a> &nbsp;·&nbsp;
    <a href="https://rustchain.org/" target="_blank">RustChain</a> &nbsp;·&nbsp;
    <a href="https://github.com/Scottcjn/rustchain-bounties" target="_blank">GitHub</a>
  </div>

</div>

<script>
const NODE_URL = 'https://50.28.86.131';
const VERIFY_BASE = 'https://rustchain.org/bcos/verify';

let currentCertId = '';
let currentStyle = 'flat';
let iframeW = 560, iframeH = 315;

function selectStyle(btn) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStyle = btn.dataset.style;
  if (currentCertId) updateEmbedCodes();
}

function selectSize(btn) {
  document.querySelectorAll('.size-preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  iframeW = parseInt(btn.dataset.w);
  iframeH = parseInt(btn.dataset.h);
  if (currentCertId) updateEmbedCodes();
}

function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠ ' + msg;
  el.classList.add('visible');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function parseCertId(raw) {
  raw = raw.trim();
  // Already a cert ID
  if (/^BCOS-/i.test(raw)) return raw.toUpperCase();
  // GitHub URL - extract owner/repo and try to look up
  const m = raw.match(/github\.com\/([^/]+\/[^/]+)/);
  if (m) return null; // will handle via verify API
  // plain cert id without prefix?
  if (/^[a-f0-9]{6,}/i.test(raw)) return 'BCOS-' + raw;
  return null;
}

async function verifyCert(certId) {
  // Call the verify endpoint to get cert data
  try {
    const res = await fetch(`${NODE_URL}/bcos/verify/${certId}`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) return null;
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('json')) return await res.json();
    return null;
  } catch (e) {
    return null;
  }
}

function getBadgeUrl(certId, style) {
  const base = `${NODE_URL}/bcos/badge/${certId}.svg`;
  if (style === 'flat') return base;
  return base + '?style=' + style;
}

function getVerifyUrl(certId) {
  return `${VERIFY_BASE}/${certId}`;
}

async function generateBadge() {
  hideError();
  const raw = document.getElementById('certInput').value;
  if (!raw.trim()) { showError('Please enter a Certificate ID or GitHub repo URL.'); return; }

  const certId = parseCertId(raw);
  if (!certId) {
    showError('Could not parse a Certificate ID. Use format: BCOS-abc123');
    return;
  }

  // Show preview loading
  const previewSection = document.getElementById('previewSection');
  const badgeArea = document.getElementById('badgePreviewArea');
  previewSection.classList.add('visible');
  badgeArea.classList.add('loading');
  document.getElementById('badgeImg').style.display = 'none';
  document.getElementById('embedSection').classList.remove('visible');
  document.getElementById('certInfo').style.display = 'none';

  currentCertId = certId;

  // Load badge image
  const badgeUrl = getBadgeUrl(certId, currentStyle);
  const img = document.getElementById('badgeImg');
  img.onload = () => {
    badgeArea.classList.remove('loading');
    img.style.display = 'inline-block';
  };
  img.onerror = () => {
    badgeArea.classList.remove('loading');
    img.style.display = 'none';
    badgeArea.innerHTML = '<span style="color:var(--text-dim);font-size:12px">Badge image unavailable — cert may not exist</span>';
  };
  img.src = badgeUrl + '&t=' + Date.now(); // bust cache

  // Try to fetch cert info
  const certData = await verifyCert(certId);
  if (certData) {
    document.getElementById('infoCertId').textContent = certId;
    document.getElementById('infoScore').textContent = certData.trust_score !== undefined ? certData.trust_score + ' / 100' : '—';
    document.getElementById('infoTier').textContent = certData.tier || '—';
    const statusEl = document.getElementById('infoStatus');
    const valid = certData.valid !== false;
    statusEl.textContent = valid ? '✓ VALID' : '✗ INVALID';
    statusEl.className = 'field-value ' + (valid ? 'pass' : 'fail');
    document.getElementById('certInfo').style.display = 'grid';
  }

  updateEmbedCodes();
  document.getElementById('embedSection').classList.add('visible');
}

function updateEmbedCodes() {
  const certId = currentCertId;
  const badgeUrl = getBadgeUrl(certId, currentStyle);
  const verifyUrl = getVerifyUrl(certId);

  // Markdown
  document.getElementById('code-markdown').textContent =
    `[![BCOS](${badgeUrl})](${verifyUrl})`;

  // HTML
  document.getElementById('code-html').textContent =
    `<a href="${verifyUrl}" target="_blank">\n  <img src="${badgeUrl}" alt="BCOS Certified" />\n</a>`;

  // iFrame
  document.getElementById('code-iframe').textContent =
    `<iframe\n  src="${verifyUrl}"\n  width="${iframeW}"\n  height="${iframeH}"\n  frameborder="0"\n  allowfullscreen\n></iframe>`;

  // RST
  document.getElementById('code-rst').textContent =
    `.. image:: ${badgeUrl}\n   :target: ${verifyUrl}\n   :alt: BCOS Certified`;

  // Update badge img if already shown
  if (document.getElementById('badgeImg').src) {
    const img = document.getElementById('badgeImg');
    img.src = getBadgeUrl(certId, currentStyle) + '&t=' + Date.now();
  }
}

async function copyCode(elId, btn) {
  const text = document.getElementById(elId).textContent;
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ COPIED!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '⎘ COPY ' + btn.textContent.replace('✓ COPIED!','').replace('⎘ COPY ','');
      btn.classList.remove('copied');
      // restore original text
      const labels = {'code-markdown':'⎘ COPY MARKDOWN','code-html':'⎘ COPY HTML','code-iframe':'⎘ COPY IFRAME','code-rst':'⎘ COPY RST'};
      btn.textContent = labels[elId] || '⎘ COPY';
    }, 2000);
  } catch(e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('certInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateBadge();
  });
});
</script>
</body>
</html>
